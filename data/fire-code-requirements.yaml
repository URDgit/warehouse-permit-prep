# =====================================================================
#  FIRE-CODE REQUIREMENTS  —  California Fire Code (CFC), 2025 edition
# =====================================================================
#
#  These are the fire-protection requirements that get TRIGGERED once a
#  commodity is classified and the storage arrangement is known
#  (e.g. minimum aisle width, sprinkler design density, maximum pile and
#  storage heights, smoke/heat removal, etc.).
#
#  See commodity-classification.yaml for how to read a value
#  (value / status / source / todo). Every value below is a PLACEHOLDER
#  until a licensed engineer verifies it against the cited source.
# =====================================================================

meta:
  code_edition: "2025 California Fire Code (CFC)"
  edition_status: PLACEHOLDER
  governing_chapter: "2025 California Fire Code Chapter 32 — High-Piled Combustible Storage"
  reference_standard: "NFPA 13 (as referenced/adopted) for sprinkler design — VERIFY edition"

# When do high-piled storage requirements apply at all?
applicability:
  high_piled_area_threshold:
    value: null
