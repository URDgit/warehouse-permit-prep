  storage_height_threshold:
    value: null
    unit: "feet"
    status: PLACEHOLDER
    source: "2025 California Fire Code Chapter 2 / Chapter 32 definition of 'high-piled storage' — VERIFY"
    todo: "Storage height above which storage is considered 'high-piled'."

