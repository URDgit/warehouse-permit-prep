# =====================================================================
#  JURISDICTION  —  City of Los Angeles (LADBS / LAFD)
# =====================================================================
#
#  This file lists the submittal requirements and required documents for
#  a storage-rack / high-piled storage permit package in the City of
#  Los Angeles. It is structured as a self-contained "plug-in" so other
#  cities can later be added as their own files without changing code.
#
#  Every item is a PLACEHOLDER until verified against the CURRENT LADBS
#  and LAFD submittal requirements / information bulletins.
#
#  See commodity-classification.yaml for how to read a value.
# =====================================================================

meta:
  jurisdiction_id: "los-angeles"
  jurisdiction_name: "City of Los Angeles (LADBS / LAFD)"
  status: PLACEHOLDER
  source: "LADBS plan-check submittal requirements + LAFD high-piled combustible storage permit — VERIFY current bulletins/forms"
  reviewing_agencies:
    - "Los Angeles Department of Building and Safety (LADBS) — structural / rack anchorage"
    - "Los Angeles Fire Department (LAFD) — high-piled combustible storage / fire protection"

# Documents typically required in the submittal package.
required_documents:
  - id: permit_application
    name: "Permit application form(s)"
    status: PLACEHOLDER
    source: "LADBS / LAFD — VERIFY current form numbers"
    todo: "Confirm which application forms LADBS and LAFD require."
  - id: site_floor_plan
    name: "Site / floor plan showing rack layout, aisles, and exits"
    status: PLACEHOLDER
    source: "LADBS / LAFD — VERIFY"
    todo: "Confirm plan content, scale, and number of copies/format."
  - id: rack_elevations
    name: "Rack elevations and sections (heights, tiers, dimensions)"
    status: PLACEHOLDER
    source: "LADBS — VERIFY"
    todo: "Confirm required rack drawing details."
  - id: high_piled_storage_plan
    name: "High-piled combustible storage plan / commodity description"
    status: PLACEHOLDER
    source: "LAFD high-piled storage requirements — VERIFY"
    todo: "Confirm required commodity/storage information and format."
  - id: structural_calcs
    name: "Stamped rack structural & seismic anchorage calculations"
    status: PLACEHOLDER
    source: "LADBS — VERIFY"
    todo: "Confirm calculation submittal requirements and engineer-of-record stamp requirements."
  - id: sprinkler_documentation
    name: "Sprinkler system documentation / fire protection plan"
    status: PLACEHOLDER
    source: "LAFD / LADBS — VERIFY"
    todo: "Confirm whether existing-system documentation and/or deferred sprinkler submittal is required."

# Rules for WHEN each requirement is triggered (by area, height, commodity).
#
# HOW TRIGGERS WORK
# -----------------
# While status below is not VERIFIED, the app lists every document as
# "verify applicability" and decides nothing. When an engineer sets
# status: VERIFIED, the app evaluates each document:
#   - a document with NO `applies_when:` is required for every submittal;
#   - a document WITH an `applies_when:` is Required / Not required /
#     "verify" depending on whether its conditions match the project inputs.
#
# Give a document an `applies_when:` block (same condition format as the
# commodity rules) to make it conditional, for example:
#
#   - id: high_piled_storage_plan
#     name: "High-piled combustible storage plan"
#     source: "LAFD — VERIFY"
#     applies_when: { high_piled_area_sqft: { gte: 500 } }
#
# Fields you may test in `applies_when`:
#   high_piled_area_sqft, total_building_area_sqft, storage_height_ft,
#   ceiling_height_ft, aisle_width_ft, existing_sprinkler,
#   sprinkler_system_type, anchored, commodity_class
# (commodity_class is the result of the classification step; if it is still
#  UNDETERMINED, any document that depends on it shows "verify".)
submittal_rules:
  status: PLACEHOLDER
  source: "LADBS / LAFD submittal triggers — VERIFY"
  todo: >
    Define the conditions under which each document is required (e.g.
    high-piled area over a threshold, storage above a height, specific
    commodity classes), then set status: VERIFIED. No triggers are assumed;
    until then the app lists all documents as "verify applicability".

# =====================================================================
#  SUBMITTAL REQUIREMENTS CHECKLIST
# =====================================================================
#  A code-grounded checklist of (a) what the PLANS must show and (b) the
#  structural/fire documents reviewers expect — to help prepare a complete,
#  site-specific package (the #1 cause of plan-check rejection is an
#  incomplete or generic submittal). These are submittal/documentation
#  requirements, not engineering values. Confirm each citation against the
#  CURRENT adopted code edition.

# What the drawings must show (California Fire Code Ch. 32, §3201.3).
plan_content_requirements:
  - id: floor_plan
    name: "Floor plan showing high-piled storage areas and dimensions"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: storage_height
    name: "Usable storage height for each storage area"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: rack_tiers
    name: "Number of tiers within each rack"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: commodity_clearance
    name: "Clearance between top of storage and sprinkler deflector"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: aisle_dimensions
    name: "Aisle dimensions between storage arrays"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: max_pile_volume
    name: "Maximum pile volume for each storage array"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: commodity_classification
    name: "Commodity location and classification (per §3203)"
    source: "2025 California Fire Code §3201.3 / §3203 — VERIFY"
  - id: encapsulated_locations
    name: "Locations of banded or encapsulated commodities"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: fd_access_doors
    name: "Fire department access door locations"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: suppression_detection
    name: "Type of fire suppression and detection systems"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: sprinkler_valves
    name: "Ceiling and in-rack sprinkler control valve locations"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: smoke_curtain
    name: "Smoke removal and curtain board system specifications"
    source: "2025 California Fire Code §3201.3 — VERIFY"
  - id: flue_spaces
    name: "Transverse and longitudinal flue space dimensions"
    source: "2025 California Fire Code §3201.3 — VERIFY"

# Structural / fire documents reviewers expect in the package.
structural_submittal_requirements:
  - id: pe_sealed_calcs
    name: "Structural calculations sealed by the engineer of record"
    source: "LADBS / CBC — VERIFY"
  - id: rack_member_design
    name: "Rack member design per ANSI/RMI MH16.1"
    source: "ANSI/RMI MH16.1 — VERIFY edition"
  - id: seismic_analysis
    name: "Seismic analysis per ASCE 7"
    source: "ASCE 7-22 (per 2025 CBC) — VERIFY"
  - id: baseplate_anchorage
    name: "Base plate sizing and anchorage to the existing slab"
    source: "ACI 318 Ch. 17 / ANSI-RMI MH16.1 — VERIFY"
  - id: floor_capacity
    name: "Existing floor/slab capacity verification"
    source: "Project record / field verification — VERIFY"
  - id: manufacturer_load_tables
    name: "Manufacturer shop drawings and rack load tables"
    source: "Rack manufacturer — VERIFY"
  - id: special_inspection
    name: "Special inspection of rack anchorage"
    source: "CBC Chapter 17 (special inspection) — VERIFY"
  - id: deferred_sprinkler
    name: "Deferred submittal: sprinkler / fire-protection (if applicable)"
    source: "LAFD / LADBS — VERIFY"

# Special inspections the engineer of record identifies for the rack work.
# (Confirm whether the AHJ requires its own Statement of Special Inspections form.)
special_inspections:
  - id: anchor_installation
    name: "Installation of post-installed anchors (rack base plates to slab)"
    source: "CBC Chapter 17 / ACI 318 Ch. 17 — VERIFY"
  - id: anchor_testing
    name: "Anchor proof-load / torque verification (per the anchor's ESR, if required)"
    source: "Anchor ICC-ES ESR / CBC Chapter 17 — VERIFY"
  - id: slab_verification
    name: "Verification of existing slab conditions where required"
    source: "CBC Chapter 17 — VERIFY"

# Items expected to be submitted after permit issuance (deferred submittals).
deferred_submittals:
  - id: sprinkler_system
    name: "Automatic sprinkler / in-rack sprinkler system"
    source: "LAFD / NFPA 13 — VERIFY"
  - id: fire_alarm
    name: "Fire detection / alarm modifications (if applicable)"
    source: "LAFD — VERIFY"
