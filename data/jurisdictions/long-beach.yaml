#
#  TEMPLATE / STARTER profile for permits in the City of Long Beach,
#  reviewed by Long Beach Development Services (Building & Safety) and the
#  Long Beach Fire Department. Structure mirrors the other jurisdiction
#  files; every jurisdiction-specific value is a PLACEHOLDER to confirm
#  with a licensed engineer against the current adopted city code and
#  submittal requirements. The statewide California Fire Code (Chapter 32)
#  plan-content list applies here too (verify local amendments).
# =====================================================================

meta:
  jurisdiction_id: "long-beach"
  jurisdiction_name: "City of Long Beach (LBDS / LBFD)"
  status: PLACEHOLDER
  source: "Long Beach Development Services Building & Safety + Long Beach Fire — VERIFY current submittal requirements"
  reviewing_agencies:
    - "City of Long Beach Development Services — Building and Safety (structural / rack anchorage)"
    - "Long Beach Fire Department (high-piled combustible storage / fire protection)"

required_documents:
  - id: permit_application
    name: "Permit application form(s)"
    status: PLACEHOLDER
    source: "Long Beach Development Services / Fire — VERIFY current form numbers"
  - id: site_floor_plan
    name: "Site / floor plan showing rack layout, aisles, and exits"
    status: PLACEHOLDER
    source: "Long Beach Development Services — VERIFY"
  - id: rack_elevations
    name: "Rack elevations and sections (heights, tiers, dimensions)"
    status: PLACEHOLDER
    source: "Long Beach Development Services — VERIFY"
  - id: high_piled_storage_plan
    name: "High-piled combustible storage plan / commodity description"
    status: PLACEHOLDER
    source: "Long Beach Fire — VERIFY"
  - id: structural_calcs
    name: "Stamped rack structural & seismic anchorage calculations"
    status: PLACEHOLDER
    source: "Long Beach Development Services — VERIFY"
  - id: sprinkler_documentation
    name: "Sprinkler system documentation / fire protection plan"
    status: PLACEHOLDER
    source: "Long Beach Fire — VERIFY"

submittal_rules:
  status: PLACEHOLDER
  source: "Long Beach submittal triggers — VERIFY"
