# =====================================================================
#  JURISDICTION  —  County of Los Angeles (unincorporated)
# =====================================================================
#
#  TEMPLATE / STARTER profile for permits in unincorporated LA County,
#  reviewed by LA County Public Works (Building & Safety) and LA County
#  Fire. The structure mirrors the City of Los Angeles file; every
#  jurisdiction-specific value is a PLACEHOLDER to be confirmed with a
#  licensed engineer against the CURRENT adopted county code and the
#  county's submittal requirements. The statewide California Fire Code
#  (Chapter 32) plan-content list applies here too (verify local amendments).
# =====================================================================

meta:
  jurisdiction_id: "la-county"
  jurisdiction_name: "County of Los Angeles (Public Works B&S / LA County Fire)"
  status: PLACEHOLDER
  source: "LA County Public Works Building & Safety + LA County Fire — VERIFY current submittal requirements"
  reviewing_agencies:
    - "Los Angeles County Department of Public Works — Building and Safety (structural / rack anchorage)"
    - "Los Angeles County Fire Department (high-piled combustible storage / fire protection)"

required_documents:
  - id: permit_application
    name: "Permit application form(s)"
    status: PLACEHOLDER
    source: "LA County Public Works / Fire — VERIFY current form numbers"
