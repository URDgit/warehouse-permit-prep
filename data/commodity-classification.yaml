# ---------------------------------------------------------------------
#  The decision logic that maps intake answers to one of the classes
#  above. This is intentionally NOT implemented with guessed rules.
#  Until an engineer defines it, the app returns "UNDETERMINED".
# ---------------------------------------------------------------------
classification_rules:
  status: PLACEHOLDER
  source: "2025 California Fire Code Chapter 32 commodity classification provisions and tables — VERIFY"
  todo: >
    A licensed engineer must define how the intake answers (primary
    material, packaging, plastic content, encapsulation, idle pallets,
    etc.) map to a commodity class. Because misclassification is a life-
    safety issue, no default mapping is provided. When ready, replace
    this block with explicit rules and set status to VERIFIED.
  # ------------------------------------------------------------------
  #  THE DECISION TREE (engineer-defined)
  #  When ready, the engineer lists rules under `rules:` below and sets
  #  the `status:` above to VERIFIED. The app checks each rule from top to
  #  bottom and uses the FIRST one whose conditions all match. While status
  #  is not VERIFIED, the app ignores these rules and returns UNDETERMINED.
  #
  #  Condition formats allowed inside `when:`
  #    plastic_content: significant            # equals
  #    packaging: { in: [cartoned, exposed] }  # matches any value in the list
  #    plastic_content: { not: none }          # not equal
  #    storage_height_ft: { gte: 12 }          # number >= (also lte, gt, lt)
  #  Fields you may test:
  #    plastic_content, packaging, encapsulated, idle_pallets,
  #    primary_material, storage_height_ft, ceiling_height_ft,
  #    high_piled_area_sqft
  #  `assign_class` must be one of the class ids listed above.
  # ------------------------------------------------------------------
  rules: []

  # EXAMPLE ONLY — never read by the app (the key is `example_rules`, not
  # `rules`). Copy entries into `rules:` above and VERIFY them before use.
  example_rules:
    - when: { plastic_content: significant, encapsulated: true }
      assign_class: group_a_plastics
      source: "2025 California Fire Code §32xx.x (EXAMPLE — verify)"
    - when: { packaging: cartoned, plastic_content: { in: [none, limited] } }
      assign_class: class_III
      source: "2025 California Fire Code §32xx.x (EXAMPLE — verify)"
