# ---------------------------------------------------------------------
#  The decision logic that maps intake answers to one of the classes
#  above. This is intentionally NOT implemented with guessed rules.
#  Until an engineer defines it, the app returns "UNDETERMINED".
# ---------------------------------------------------------------------
classification_rules:
  status: PLACEHOLDER
  source: "CFC 2022 Chapter 32 commodity classification provisions and tables — VERIFY"
  todo: >
    A licensed engineer must define how the intake answers (primary
    material, packaging, plastic content, encapsulation, idle pallets,
    etc.) map to a commodity class. Because misclassification is a life-
    safety issue, no default mapping is provided. When ready, replace
    this block with explicit rules and set status to VERIFIED.
  # Example of the SHAPE a future rule could take (NOT active, NOT a real rule):
  # rules:
  #   - when: { plastic_content: "significant", encapsulated: true }
  #     assign_class: group_a_plastics
  #     source: "CFC 2022 §32xx.x"
