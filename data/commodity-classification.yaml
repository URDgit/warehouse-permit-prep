# =====================================================================
#  COMMODITY CLASSIFICATION  —  California Fire Code (CFC), 2025 edition
# =====================================================================
#
#  WHAT THIS FILE IS
#  -----------------
#  This file tells the app how a stored commodity is classified
#  (Class I, II, III, IV, or a plastics group) and which code section
#  that classification comes from. The app does NOT know any of this on
#  its own — it only reads what is written here.
#
#  HOW TO READ A VALUE
#  -------------------
#  Every code value is an object with these fields:
#     value   : the actual value (a number, text, or null if not set yet)
#     status  : PLACEHOLDER  = NOT yet verified — do not trust it
#               VERIFIED     = a licensed engineer has confirmed it
#     source  : the exact code citation it comes from
#     todo    : (placeholders only) what is needed and where to find it
#
#  RULE: The app will NEVER treat a PLACEHOLDER as a real answer. It will
#  carry it into the report clearly marked "PLACEHOLDER — needs engineer".
#
#  Edit the text inside quotes. Keep the field names (value, status, ...)
#  and the indentation exactly as they are. When you and your engineer
#  confirm a value, fill in `value:` and change `status:` to VERIFIED.
# =====================================================================

meta:
  code_edition: "2025 California Fire Code (CFC)"
  edition_status: PLACEHOLDER   # VERIFY which CFC edition LADBS/LAFD enforces for this project
  governing_chapter: "2025 California Fire Code Chapter 32 — High-Piled Combustible Storage"
  source_note: "Commodity classes are defined in CFC Chapter 32. Confirm exact section and table numbers against the adopted code."

# Illustrative example classification, used ONLY to pre-fill the package in
# illustrative mode. This is NOT a verified classification and NOT a rule
# output — the engine renders it but still treats it as unverified. The
# illustrative dataset fills `value`; otherwise it stays empty.
illustrative_class:
  value: ""
  status: PLACEHOLDER
  source: "2025 California Fire Code §3203 (commodity classification) — illustrative only"

