    name: "Class I"
    description:
      value: null
      status: PLACEHOLDER
      source: "2025 California Fire Code Chapter 32 (commodity classification) — VERIFY exact section/table"
      todo: "Enter the code definition of a Class I commodity."
  - id: class_II
